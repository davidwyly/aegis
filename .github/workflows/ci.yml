name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  app:
    name: app (typecheck + vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test

  contracts:
    name: contracts (hardhat)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: install blockchain deps
        working-directory: blockchain
        run: pnpm install --frozen-lockfile
      - run: pnpm contracts:compile
      - run: pnpm contracts:test
